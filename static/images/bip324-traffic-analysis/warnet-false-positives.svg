<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Warnet false positives by event and analysis view</title>
  <desc id="desc">Grouped horizontal bar chart comparing false-positive counts for all flows, Bitcoin port filter, and BIP324 handshake filter.</desc>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="40" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Warnet false positives by event</text>
  <text x="40" y="64" font-family="Arial, sans-serif" font-size="14" fill="#555">Lower is better. The port and handshake filters reduce some errors, but not all event types benefit.</text>
  <rect x="40" y="84" width="14" height="14" fill="#4c78a8"/><text x="62" y="96" font-family="Arial, sans-serif" font-size="13" fill="#333">all flows</text>
  <rect x="150" y="84" width="14" height="14" fill="#f58518"/><text x="172" y="96" font-family="Arial, sans-serif" font-size="13" fill="#333">bitcoin port</text>
  <rect x="270" y="84" width="14" height="14" fill="#54a24b"/><text x="292" y="96" font-family="Arial, sans-serif" font-size="13" fill="#333">BIP324 handshake filter</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#333">
    <text x="40" y="143">BIP324 handshake</text>
    <rect x="230" y="126" width="2" height="12" fill="#4c78a8"/><text x="242" y="137">0</text>
    <rect x="230" y="144" width="2" height="12" fill="#f58518"/><text x="242" y="155">0</text>
    <rect x="230" y="162" width="2" height="12" fill="#54a24b"/><text x="242" y="173">0</text>

    <text x="40" y="213">Block arrival</text>
    <rect x="230" y="196" width="342" height="12" fill="#4c78a8"/><text x="582" y="207">1710</text>
    <rect x="230" y="214" width="166" height="12" fill="#f58518"/><text x="406" y="225">831</text>
    <rect x="230" y="232" width="166" height="12" fill="#54a24b"/><text x="406" y="243">831</text>

    <text x="40" y="283">Compact block</text>
    <rect x="230" y="266" width="214" height="12" fill="#4c78a8"/><text x="454" y="277">1072</text>
    <rect x="230" y="284" width="207" height="12" fill="#f58518"/><text x="447" y="295">1035</text>
    <rect x="230" y="302" width="207" height="12" fill="#54a24b"/><text x="447" y="313">1035</text>

    <text x="40" y="353">Large transaction</text>
    <rect x="230" y="336" width="88" height="12" fill="#4c78a8"/><text x="328" y="347">439</text>
    <rect x="230" y="354" width="81" height="12" fill="#f58518"/><text x="321" y="365">405</text>
    <rect x="230" y="372" width="81" height="12" fill="#54a24b"/><text x="321" y="383">405</text>

    <text x="40" y="423">Address response</text>
    <rect x="230" y="406" width="26" height="12" fill="#4c78a8"/><text x="266" y="417">132</text>
    <rect x="230" y="424" width="26" height="12" fill="#f58518"/><text x="266" y="435">132</text>
    <rect x="230" y="442" width="26" height="12" fill="#54a24b"/><text x="266" y="453">132</text>
  </g>
  <line x1="230" y1="475" x2="560" y2="475" stroke="#ccc"/>
  <text x="226" y="496" font-family="Arial, sans-serif" font-size="12" fill="#666">0</text>
  <text x="395" y="496" font-family="Arial, sans-serif" font-size="12" fill="#666">900</text>
  <text x="565" y="496" font-family="Arial, sans-serif" font-size="12" fill="#666">1800</text>
</svg>
